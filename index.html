<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulso360</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.app {
    background: white;
    width: 350px;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

.progress {
    height: 6px;
    background: #eee;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #4facfe;
    transition: 0.3s;
}

.question {
    font-size: 18px;
    margin-bottom: 20px;
}

.options button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #f0f0f0;
    cursor: pointer;
    transition: 0.2s;
}

.options button:hover {
    background: #4facfe;
    color: white;
}

.result {
    font-size: 16px;
}
</style>
</head>

<body>

<div class="app">

<div class="progress">
    <div class="progress-bar" id="progress"></div>
</div>

<h2>Pulso360</h2>

<div id="contenido"></div>

</div>

<script>

const preguntas = [

    // EMOCIONAL
    { texto: "¿Te has sentido triste sin razón?", tipo: "emocional" },
    { texto: "¿Te has sentido preocupado o nervioso?", tipo: "emocional" },
    { texto: "¿Te cuesta disfrutar cosas que antes te gustaban?", tipo: "emocional" },

    // ACADÉMICO
    { texto: "¿Te cuesta concentrarte en clase?", tipo: "academico" },
    { texto: "¿Dejas tareas para el último momento?", tipo: "academico" },
    { texto: "¿Sientes que tu rendimiento ha bajado?", tipo: "academico" },
    { texto: "¿Evitas actividades escolares importantes?", tipo: "academico" },

    // SOCIAL
    { texto: "¿Te sientes solo/a aunque estés con otros?", tipo: "social" },
    { texto: "¿Has tenido conflictos con compañeros?", tipo: "social" },
    { texto: "¿Sientes que tienes con quién hablar?", tipo: "social", invertida: true },
    { texto: "¿Sientes que encajas en tu escuela?", tipo: "social", invertida: true },

    // AUTOCUIDADO
    { texto: "¿Has dormido mal últimamente?", tipo: "autocuidado" },
    { texto: "¿Te sientes cansado/a durante el día?", tipo: "autocuidado" },

    // MOTIVACIÓN
    { texto: "¿Te cuesta encontrar motivación para ir a la escuela?", tipo: "motivacion" },
    { texto: "¿Sientes que lo que haces en la escuela vale la pena?", tipo: "motivacion", invertida: true },

    // RIESGO
    { texto: "¿Has sentido que nada vale la pena?", tipo: "riesgo" },
    { texto: "¿Has pensado en dejar la escuela?", tipo: "riesgo" }
];

let index = 0;
let respuestas = [];

function mostrarPregunta() {
    let progreso = (index / preguntas.length) * 100;
    document.getElementById("progress").style.width = progreso + "%";

    document.getElementById("contenido").innerHTML = `
        <div class="question">${preguntas[index].texto}</div>
        <div class="options">
            <button onclick="responder(0)">Nunca</button>
            <button onclick="responder(1)">A veces</button>
            <button onclick="responder(2)">Frecuentemente</button>
            <button onclick="responder(3)">Casi siempre</button>
        </div>
    `;
}

function responder(valor) {
    respuestas.push(valor);
    index++;

    if (index < preguntas.length) {
        mostrarPregunta();
    } else {
        calcularResultado();
    }
}

function calcularResultado() {

    let scores = {
        emocional: 0,
        academico: 0,
        social: 0,
        autocuidado: 0,
        motivacion: 0,
        riesgo: 0
    };

    let alertaCritica = false;

    respuestas.forEach((valor, i) => {
        let p = preguntas[i];

        if (p.invertida) {
            valor = 3 - valor;
        }

        scores[p.tipo] += valor;

        if (p.tipo === "riesgo" && valor >= 2) {
            alertaCritica = true;
        }
    });

    let total = Object.values(scores).reduce((a, b) => a + b, 0);

    let principal = Object.keys(scores).reduce((a, b) =>
        scores[a] > scores[b] ? a : b
    );

    let nivel = "";

    if (alertaCritica || total > 30) {
        nivel = "alto";
    } else if (total > 20) {
        nivel = "moderado";
    } else if (total > 10) {
        nivel = "leve";
    } else {
        nivel = "bajo";
    }

    mostrarResultado(nivel, principal);
}

function mostrarResultado(nivel, area) {

    let mensajes = {
        bajo: "🟢 En general te encuentras bien.",
        leve: "🟡 Hay algunas áreas que podrías mejorar.",
        moderado: "🟠 Podrías estar pasando por un momento difícil.",
        alto: "🔴 Es importante que hables con alguien de confianza o un profesional."
    };

    let areas = {
        emocional: "emocional",
        academico: "académica",
        social: "social",
        autocuidado: "de autocuidado",
        motivacion: "de motivación",
        riesgo: "de riesgo personal"
    };

    document.getElementById("contenido").innerHTML = `
        <div class="result">
            <p>${mensajes[nivel]}</p>
            <p>Área principal detectada: <strong>${areas[area]}</strong></p>
        </div>
        <br>
        <button onclick="reiniciar()">Volver a empezar</button>
    `;
}

function reiniciar() {
    index = 0;
    respuestas = [];
    mostrarPregunta();
}

mostrarPregunta();

</script>

</body>
</html>
